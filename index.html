<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Notification App — Design System</title>
  <link rel="stylesheet" href="design-system/design-system.css">
</head>
<body class="app">
  <!-- Top Bar -->
  <header class="topbar">
    <span class="topbar__brand">Job Notification App</span>
    <span class="topbar__progress">Step 1 / 4</span>
    <div class="topbar__status">
      <span class="badge badge-neutral">In Progress</span>
    </div>
  </header>

  <!-- Shared Primary Navigation -->
  <nav class="primary-nav" aria-label="Primary">
    <div class="primary-nav__inner">
      <div class="primary-nav__links primary-nav__links--desktop">
        <a href="/dashboard" data-route="/dashboard" class="primary-nav__link">Dashboard</a>
        <a href="/saved" data-route="/saved" class="primary-nav__link">Saved</a>
        <a href="/digest" data-route="/digest" class="primary-nav__link">Digest</a>
        <a href="/settings" data-route="/settings" class="primary-nav__link">Settings</a>
        <a href="/proof" data-route="/proof" class="primary-nav__link">Proof</a>
      </div>
      <button type="button" class="primary-nav__toggle" aria-label="Toggle navigation" aria-expanded="false">
        <span class="primary-nav__icon"></span>
      </button>
    </div>
    <div class="primary-nav__links primary-nav__links--mobile" hidden>
      <a href="/dashboard" data-route="/dashboard" class="primary-nav__link">Dashboard</a>
      <a href="/saved" data-route="/saved" class="primary-nav__link">Saved</a>
      <a href="/digest" data-route="/digest" class="primary-nav__link">Digest</a>
      <a href="/settings" data-route="/settings" class="primary-nav__link">Settings</a>
      <a href="/proof" data-route="/proof" class="primary-nav__link">Proof</a>
    </div>
  </nav>

  <!-- Context Header -->
  <section class="context-header">
    <h1 id="page-title">Dashboard</h1>
    <p class="subtext" id="page-subtitle">This section will be built in the next step.</p>
  </section>

  <!-- Main: Workspace + Panel -->
  <main class="main">
    <div class="workspace">
      <section id="route-view" class="route-view">
        <!-- Route placeholder content will be rendered here -->
      </section>
    </div>

    <aside class="panel">
      <div class="panel__section">
        <h4 class="panel__title">Step</h4>
        <p class="panel__step-desc">Use this area for step explanation and copyable prompts.</p>
      </div>
      <div class="panel__section">
        <h4 class="panel__title">Prompt</h4>
        <div class="prompt-box">
          <pre>Copy this prompt into your workflow.</pre>
        </div>
        <button type="button" class="btn btn-primary">Copy</button>
        <button type="button" class="btn btn-secondary">Secondary</button>
      </div>
    </aside>
  </main>

  <!-- Proof Footer -->
  <footer class="proof-footer">
    <ul class="checklist">
      <li><input type="checkbox" id="c1" aria-label="UI Built"><label for="c1">UI Built</label></li>
      <li><input type="checkbox" id="c2" aria-label="Logic Working"><label for="c2">Logic Working</label></li>
      <li><input type="checkbox" id="c3" aria-label="Test Passed"><label for="c3">Test Passed</label></li>
      <li><input type="checkbox" id="c4" aria-label="Deployed"><label for="c4">Deployed</label></li>
    </ul>
  </footer>
  <script src="app.js"></script>
</body>
</html>
